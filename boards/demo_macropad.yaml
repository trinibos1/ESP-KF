  cols: 3
  pins:
    rows: [1, 2]
    cols: [3, 4, 5]
hardware:
  flash_size_mb: 16
  psram: false
  partition_table: singleapp
transport:
  usb: true
  ble: true
usb:
  manufacturer: "EFK"
  product: "Demo Macropad"
